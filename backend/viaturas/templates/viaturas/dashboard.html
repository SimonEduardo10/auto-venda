{% extends 'viaturas/base.html' %}

{% block content %}

<style>
.dashboard-title {
    font-weight: 700;
    color: #0f172a;
}

.card-custom {
    border: none;
    border-radius: 12px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

/* 🔥 CONTROLA O TAMANHO DO GRÁFICO */
.chart-box {
    max-width: 500px;
    margin: auto;
}
</style>

<h3 class="dashboard-title">📊 Dashboard</h3>

<!-- CARD TOTAL -->
<div class="row mt-3">
    <div class="col-md-4">
        <div class="card card-custom p-3">
            <h5>🚗 Total de Viaturas</h5>
            <h2>{{ total_viaturas }}</h2>
        </div>
    </div>
</div>

<br>

<!-- GRÁFICO MENOR -->
<div class="card card-custom p-3 mt-3 text-center">
    <h5>📈 Viaturas por Marca</h5>

    <div class="chart-box">
        <canvas id="grafico"></canvas>
    </div>

</div>

<br>

<!-- TABELA -->
<h4>🚗 Últimas Viaturas</h4>

<table class="table table-striped table-hover mt-2 card-custom">
    <thead class="table-dark">
        <tr>
            <th>Marca</th>
            <th>Modelo</th>
            <th>Ano</th>
            <th>Preço</th>
        </tr>
    </thead>

    <tbody>
        {% for v in viaturas_recentes %}
        <tr>
            <td>{{ v.marca }}</td>
            <td>{{ v.modelo }}</td>
            <td>{{ v.ano }}</td>
            <td>{{ v.preco }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('grafico');

const labels = JSON.parse('{{ labels|escapejs }}');
const valores = JSON.parse('{{ valores|escapejs }}');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Viaturas por Marca',
            data: valores,
            borderWidth: 1
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
            y: { beginAtZero: true }
        }
    }
});
</script>

{% endblock %}

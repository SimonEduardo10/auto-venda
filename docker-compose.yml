version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres_db

    environment:
      POSTGRES_DB: autovenda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: ./backend
    container_name: django_app

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    depends_on:
      - db

volumes:
  postgres_data: